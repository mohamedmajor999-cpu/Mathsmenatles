<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur d’activité MathsMentales</title>
    <link rel="stylesheet" href="js/libs/JSXGraph1.11.1/jsxgraph.css" type="text/css" /><link rel="stylesheet" href="js/libs/codemirror/codemirror.css" /><link rel="stylesheet" href="css/editoryaml.css">
    <script src="js/lib.editoryaml.js?v=1" type="module" defer></script>
</head>
<body>
<div style="display:flex; width:100%;height: calc( 100vh - 50px);">
    <div id="input" style="width:50%; height: 100%;">
        <h2>Éditeur d’activité MathsMentales en yaml</h2>
        <button id="testBtn" title="Affiche l'activité">Visualiser</button> 
        <button id="saveBtn" title="Charge le fichier json sur l'ordinateur">Télécharger</button> 
        <button title="Charge une activité au hasard" id="randomBtn">Au hasard</button>
        <input type="text" placeholder="ID d'activité" id="actIDImport" size="8" title="Importe une activité existante par son ID">
        <input type="file" id="openFileInput" title="Importe un fichier json dans l'éditeur"><br>
        <textarea id="inputTextArea">title: blabla
type: text ou latex
dest: [chap1, chap2, ...]
speech: 1 # les questions seront lues telles quelles, sauf si vous définissez ce qu’il faut lire par audio

consts: # constantes utilisées globalement.
# Attention, si elles contiennent des variables, ces variables doivent être définies dans toutes les options
  nom1: valeurs
  nom2: valeurs
vars: # variables globales, disponibles dans toutes les options
  v1: valeur
  v2: valeur
options:
  - name: un texte qui décrit l’option
    vars:
      v3: valeur # ne pas utiliser des noms utilisés dans les constantes ou les variables globales
      v4: valeur
    question: un texte ou une formule, objet de la question
    answer: :question reprend la question
    shortq: question version courte
    audio: le texte à voix haute qui reprend la question
    value: la valeur courte attendue pour les ceintures, ou la version online. # si elle n’existe pas, c’est answer qui est pris je crois
</textarea>
    </div>
    <div style="width:50%">
        <h2>Visualisation</h2>
            <section id="result">
                <div id="display">
                <div id="param-title-act"></div>
                <div id="activityTitle"></div>
                <div id="voix"></div>
                <div id="activityDescription"></div>
                <div id="activityConsigne"></div>
                <div id="activityOptions"></div>
                <div id="phantom"></div>
                <div id="divparams"></div>
                <div id="errors"></div>
            </section>
        </div>
    </div>
</div>   
</body>
</html>
