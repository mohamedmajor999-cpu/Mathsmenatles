options:
  - name: Placer l'aiguille des heures (heure pile, le matin)
    vars:
      heures: "0_12"
      angle: ${:heures*30}
    question: Il est :heures h 00. Dessine l’aiguille des heures.
    answer: ""
    figure:
      type: svg
      content: ${:horlogeSimple}
    figureCorrection:
      type: svg
      content: ${:horlogeSimple}
  - name: Placer l’aiguille des heures (heure pile, l’après-midi)
    vars:
      heures: "12_23"
      angle: ${:heures*30}
    question: Il est :heures h 00. Dessine l’aiguille des heures.
    answer: ""
    figure:
      type: svg
      content: ${:horlogeSimple}
    figureCorrection:
      type: svg
      content: ${:horlogeSimple}
  - name: Placer l’aiguille des minutes par quarts d’heure
    vars:
      heures: "0_23"
      minutes: [0, 15, 30, 45]
      angle: ${:heures*30+:minutes*0.5}
      angleM: ${:minutes*6}
    question: Il est :heures h ${:minutes<10?0:''}:minutes. Dessine l’aiguille des minutes.
    answer: ""
    figure:
      type: svg
      content: ${:horloge}
    figureCorrection:
      type: svg
      content: ${:horloge}
  - name: Placer l’aiguille des minutes
    vars:
      heures: "0_23"
      minutes: "0_59"
      angle: ${:heures*30+:minutes*0.5}
      angleM: ${:minutes*6}
    question: Il est :heures h ${:minutes<10?0:''}:minutes. Dessine l’aiguille des minutes.
    answer: ""
    figure:
      type: svg
      content: ${:horloge}
    figureCorrection:
      type: svg
      content: ${:horloge}
