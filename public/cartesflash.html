<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>Cartes Flash MathsMentales</title>
        <style>
            /*MMentales*/
            @page{
                size:A4 portrait;
                margin:1cm;
            }
        </style>
        <link rel="stylesheet" href="css/cartesflash.css?v=2" type="text/css" />
        <link href="js/libs/katex/katex.min.css" rel="stylesheet" type="text/css" />
        <link rel="stylesheet" href="css/jsxgraph.css" type="text/css" />
        <script src="js/libs/ceintures.alllibs.js" defer></script>
        <script type="module" src="js/lib.cartesflash.js?v=2.0.49"></script>
        <script src="js/matomo.js"></script>
    </head>  
    <body size="A4">
        <div id="creator-container"><section id="creator-menu">
                <button onclick="window.print();">Print</button> pour imprimer ou faire un pdf.
                <button id="btnPageOrientation" title="Change l'orientation de la page">paysage</button>
                <button id="btnRectoVerso" title="Change le type d'impression">Recto</button>
                <br>
                Décoration :
                <input type="color" id="inputCoinColor" title="Couleur du coin Q">
                Texte <input type="text" id="identifiant" size="15" title="Entrée pour valider" placeholder="Multiplications...">
                <input type="color" id="inputDecoColor" title="Couleur du texte décoratif">
                Bord du verso
                <input type="color" id="inputcolorborder" title="Couleur de la bordure des réponses">
                <br>Taille de la carte :
                L<input id="inputwidth" value="55" title="Taille cartes" type="number" size="4" min="30" max="100"> mm
                H<input id="inputheight" value="55" title="Taille cartes" type="number" size="3" min="30" max="180"> mm
            </section><section id="creator-content"></section>
            </div>
    </body>
</html>
